name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint-test:
    name: Backend — Lint & Security
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt bandit

      - name: Bandit security scan
        run: bandit -r app/ -ll --exit-zero

      - name: Import check
        run: python -c "from app.main import app; print('OK')"

  frontend-lint:
    name: Frontend — Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t reconops-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t reconops-frontend:ci ./frontend

  trivy-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - uses: actions/checkout@v4

      - name: Build backend for scanning
        run: docker build -t reconops-backend:scan ./backend

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: reconops-backend:scan
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL
